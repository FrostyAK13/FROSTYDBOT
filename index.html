        <meta property="og:title" content="Deriv Bot" />

            content="Import your current bot or learn how to create a trading bot from scratch with our detailed guides, FAQs, and tutorials. Start with a quick strategy!"

        <style>

    <body class="body theme theme--light">
        <div id="modal_root" class="modal-root"></div>
        <div id="root"></div>

        <style>
            :root {
                --ft-gold-1: #ffd86b;
                --ft-gold-2: #ffb700;
            }

            /* Minimal inline preloader styles so it displays immediately */
            .preloader {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999999;
                background: linear-gradient(180deg, #061018 0%, #071226 100%);
                -webkit-font-smoothing: antialiased;
            }

            .preloader__inner {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                z-index: 3;
            }

            .preloader__title {
                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    Roboto,
                    'Helvetica Neue',
                    Arial;
                font-weight: 800;
                font-size: clamp(36px, 10vw, 120px);
                text-transform: lowercase;
                letter-spacing: 0.06em;
                background: linear-gradient(90deg, var(--ft-gold-1) 0%, var(--ft-gold-2) 50%, var(--ft-gold-1) 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: 0 6px 24px rgba(255, 183, 0, 0.18);
                transform-origin: center;
                animation:
                    preloader-bounce 1.6s cubic-bezier(0.22, 1, 0.36, 1) infinite,
                    preloader-glint 2.6s linear infinite;
            }

            .preloader__text {
                color: #fff;
                font-size: 1.2rem;
                opacity: 0.95;
                letter-spacing: 0.02em;
            }

            .preloader__gold-overlay {
                position: fixed;
                inset: 0;
                background: linear-gradient(180deg, rgba(255, 199, 71, 0.16), rgba(255, 183, 0, 0.08));
                pointer-events: none;
                z-index: 2;
                animation: gold-fade 3s ease-in-out infinite;
            }

            @keyframes preloader-bounce {
                0% {
                    transform: translateY(0) scale(0.98);
                }
                40% {
                    transform: translateY(-12px) scale(1.06);
                }
                70% {
                    transform: translateY(-6px) scale(1.02);
                }
                100% {
                    transform: translateY(0) scale(0.98);
                }
            }

            @keyframes preloader-glint {
                0% {
                    filter: brightness(1);
                }
                50% {
                    filter: brightness(1.12);
                }
                100% {
                    filter: brightness(1);
                }
            }

            @keyframes gold-fade {
                0% {
                    opacity: 0;
                }
                25% {
                    opacity: 0.12;
                }
                50% {
                    opacity: 0.18;
                }
                75% {
                    opacity: 0.12;
                }
                100% {
                    opacity: 0;
                }
            }
        </style>
        <!-- End LiveChat script -->

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const shouldSkipSW = isFirefox || isSafari;

            if (shouldSkipSW) {
                const browserName = isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker
                        .getRegistrations()
                        .then(registrations => {
                            registrations.forEach(registration => {
                                console.log(`[HTML] Unregistering existing SW for ${browserName}:`, registration.scope);
                                registration.unregister();
                            });
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to cleanup service workers:', error);
                        });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
    </body>
</html>
